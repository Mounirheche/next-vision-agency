<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<script src="./ar-dict.js"></script>
<script src="./i18n.js"></script>
<script src="./site-data.js"></script>
</head>
<body>
<x-dc>
<div style="position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;">
  <sc-if value="{{ showGrid }}" hint-placeholder-val="{{ true }}">
    <div style="position: absolute; inset: -64px; background-image: linear-gradient(rgba(59,130,246,0.055) 1px, transparent 1px), linear-gradient(90deg, rgba(59,130,246,0.055) 1px, transparent 1px); background-size: 64px 64px; animation: nvGrid 14s linear infinite; mask-image: radial-gradient(ellipse 90% 70% at 50% 30%, black 40%, transparent 100%);"></div>
  </sc-if>
  <div style="position: absolute; top: -180px; right: -120px; width: 700px; height: 700px; border-radius: 50%; background: radial-gradient(circle, rgba(0,207,255,0.13) 0%, transparent 65%); animation: nvGlowDrift 16s ease-in-out infinite;"></div>
  <div style="position: absolute; top: 40%; left: -260px; width: 640px; height: 640px; border-radius: 50%; background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 65%); animation: nvGlowDrift2 20s ease-in-out infinite;"></div>
  <div style="position: absolute; bottom: -200px; right: 10%; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(0,207,255,0.08) 0%, transparent 65%); animation: nvGlowDrift 22s ease-in-out infinite;"></div>
  <sc-if value="{{ showParticles }}" hint-placeholder-val="{{ true }}">
    <canvas data-nv-particles="" style="position: absolute; inset: 0; width: 100%; height: 100%;"></canvas>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;particles&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;}, &quot;grid&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return {
      showParticles: this.props.particles ?? true,
      showGrid: this.props.grid ?? true,
    };
  }

  componentDidMount() {
    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const canvas = document.querySelector('[data-nv-particles]');
    if (canvas && !prefersReduced) {
      const ctx = canvas.getContext('2d');
      let w, h;
      const resize = () => { w = canvas.width = canvas.offsetWidth; h = canvas.height = canvas.offsetHeight; };
      resize();
      window.addEventListener('resize', resize);
      const N = 55;
      const pts = Array.from({ length: N }, () => ({
        x: Math.random(), y: Math.random(),
        vx: (Math.random() - 0.5) * 0.0004, vy: -0.0002 - Math.random() * 0.0004,
        r: 0.6 + Math.random() * 1.6, a: 0.15 + Math.random() * 0.4,
        tw: Math.random() * Math.PI * 2
      }));
      const draw = (t) => {
        ctx.clearRect(0, 0, w, h);
        pts.forEach(p => {
          p.x += p.vx; p.y += p.vy;
          if (p.y < -0.02) { p.y = 1.02; p.x = Math.random(); }
          if (p.x < -0.02) p.x = 1.02; if (p.x > 1.02) p.x = -0.02;
          const tw = 0.6 + 0.4 * Math.sin(t * 0.001 + p.tw);
          ctx.beginPath();
          ctx.arc(p.x * w, p.y * h, p.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(0,207,255,' + (p.a * tw) + ')';
          ctx.fill();
        });
        this.raf = requestAnimationFrame(draw);
      };
      this.raf = requestAnimationFrame(draw);
    }
  }

  componentWillUnmount() {
    if (this.raf) cancelAnimationFrame(this.raf);
  }
}
</script>
</body>
</html>
